security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        users_in_database:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: users_in_database
            user_checker: App\Security\UserChecker
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_dashboard
            logout:
                path: app_logout
                target: app_login
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

    role_hierarchy:
        ROLE_USER:
        ROLE_ADVISOR: ROLE_USER
        ROLE_ADMIN: [ROLE_ADVISOR]

    access_control:
        - { path: ^/api/v1/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/contexts, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/validation_errors, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1, roles: ROLE_USER }
        - { path: ^/(login|register)$, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/conseiller, roles: ROLE_ADVISOR }
        - { path: ^/(comptes|transactions|budgets|objectifs|categories|notifications|profil), roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
